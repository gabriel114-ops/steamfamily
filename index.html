<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday!</title>
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 1.5s ease;
    }

    h1 {
      color: #ff4081;
    }

    p {
      font-size: 18px;
      color: #333;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #ff4081;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    .transport-message {
  display: none;
}

    button:hover {
      background: #e73370;
    }

    .hidden-message {
      display: none;
      margin-top: 20px;
      font-size: 16px;
      color: #555;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .balloon {
      position: absolute;
      bottom: -100px;
      width: 40px;
      height: 50px;
      background: red;
      border-radius: 50%;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      from { transform: translateY(0); }
      to { transform: translateY(-120vh); }
    }
  </style>
</head>
<body>
  <audio id="bg-music" autoplay loop hidden>
  <source src="cute.mp3" type="audio/mpeg">
</audio>
  <div class="card">
    <h1>🎉 Happy Birthday! 🎂</h1>
    <p id="name">To Michael</p>
    <p>Wishing you happiness, success, and lots of fun today!</p>
    <button onclick="showMessage()">Click for Surprise 🎁</button>
    <p class="hidden-message" id="surprise">Happy Happy Birthday Michael From the Steam Family! 💖</p>
    <p class="transport-message" id="send-the-person">Transporting to another page in...</p>
  </div>

  <script>
    function showMessage() {
      document.getElementById("surprise").style.display = "block";
      createBalloons();
      transport();
    }

    window.addEventListener("load", () => {
  const music = document.getElementById("bg-music");

  music.play().catch(() => {
    // if blocked, play on first click anywhere
    document.addEventListener("click", () => {
      music.play();
    }, { once: true });
  });
});

    function createBalloons() {
      for (let i = 0; i < 10; i++) {
        let balloon = document.createElement("div");
        balloon.classList.add("balloon");
        balloon.style.left = Math.random() * 100 + "vw";
        balloon.style.background = randomColor();
        balloon.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(balloon);
      }
    }

function transport() {
  let msg = document.getElementById("send-the-person");

  // 👇 show the message when button is clicked
  msg.style.display = "block";

  let i = 10;

  let countdown = setInterval(() => {
    msg.innerText = `Transporting to another page in: ${i}`;
    i--;

    if (i < 0) {
      clearInterval(countdown);
      window.location.href = "edit.html";
    }
  }, 1000);
}
    function randomColor() {
      const colors = ["#ff4d4d", "#4dff88", "#4da6ff", "#ffff66", "#ff66cc"];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    // Optional: personalize name
    let friendName = prompt("Enter your friend's name:");
    if (friendName) {
      document.getElementById("name").innerText = "Happy Birthday, " + friendName + "! 🎉";
    }

  ;
  </script>

</body>
</html>
