<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey Bday boy</title>
</head>
<body>

<video id="vid" controls loop playsinline style="width: 100%; max-width: 100%; height: auto;">
  <source src="/BDAY_BOY/Mich.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<script>
  // play video with sound after first tap
  document.addEventListener("click", () => {
    let vid = document.getElementById("vid");
    vid.muted = false;
    vid.play();
  }, { once: true });
</script>

</body>
</html>
